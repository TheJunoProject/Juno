name: Juno
options:
  bundleIdPrefix: ai.juno
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  JunoKit:
    path: ../shared/JunoKit
  Swabble:
    path: ../../Swabble

schemes:
  Juno:
    shared: true
    build:
      targets:
        Juno: all
    test:
      targets:
        - JunoTests
        - JunoLogicTests
  JunoLogicTests:
    shared: true
    build:
      targets:
        JunoLogicTests: all
    test:
      targets:
        - JunoLogicTests

targets:
  Juno:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: JunoShareExtension
        embed: true
      - target: JunoActivityWidget
        embed: true
      - target: JunoWatchApp
      - package: JunoKit
      - package: JunoKit
        product: JunoChatUI
      - package: JunoKit
        product: JunoProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/Juno.entitlements
        CODE_SIGN_STYLE: "$(JUNO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(JUNO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(JUNO_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(JUNO_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          JUNO_PUSH_TRANSPORT: direct
          JUNO_PUSH_DISTRIBUTION: local
          JUNO_PUSH_RELAY_BASE_URL: ""
          JUNO_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          JUNO_PUSH_TRANSPORT: direct
          JUNO_PUSH_DISTRIBUTION: local
          JUNO_PUSH_RELAY_BASE_URL: ""
          JUNO_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Juno
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.juno.ios
            CFBundleURLSchemes:
              - juno
        CFBundleShortVersionString: "$(JUNO_MARKETING_VERSION)"
        JunoCanonicalVersion: "$(JUNO_IOS_VERSION)"
        CFBundleVersion: "$(JUNO_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.juno.ios.bgrefresh
        NSLocalNetworkUsageDescription: Juno discovers and connects to your Juno gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _juno-gw._tcp
        NSCameraUsageDescription: Juno can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: Juno uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: Juno can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: Juno needs microphone access for voice wake.
        NSMotionUsageDescription: Juno may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: Juno needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: Juno uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        JunoPushTransport: "$(JUNO_PUSH_TRANSPORT)"
        JunoPushDistribution: "$(JUNO_PUSH_DISTRIBUTION)"
        JunoPushRelayBaseURL: "$(JUNO_PUSH_RELAY_BASE_URL)"
        JunoPushAPNsEnvironment: "$(JUNO_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  JunoShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: JunoKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(JUNO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(JUNO_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(JUNO_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(JUNO_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Juno Share
        CFBundleShortVersionString: "$(JUNO_MARKETING_VERSION)"
        CFBundleVersion: "$(JUNO_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  JunoActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/JunoActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(JUNO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(JUNO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(JUNO_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: Juno Activity
        CFBundleShortVersionString: "$(JUNO_MARKETING_VERSION)"
        CFBundleVersion: "$(JUNO_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  JunoWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: JunoWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(JUNO_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(JUNO_CODE_SIGN_STYLE)"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(JUNO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(JUNO_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(JUNO_WATCH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(JUNO_WATCH_APP_PROFILE)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Juno
        CFBundleShortVersionString: "$(JUNO_MARKETING_VERSION)"
        CFBundleVersion: "$(JUNO_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(JUNO_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  JunoWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(JUNO_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(JUNO_CODE_SIGN_STYLE)"
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(JUNO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(JUNO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(JUNO_WATCH_EXTENSION_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(JUNO_WATCH_EXTENSION_PROFILE)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: Juno
        CFBundleShortVersionString: "$(JUNO_MARKETING_VERSION)"
        CFBundleVersion: "$(JUNO_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(JUNO_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  JunoTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: Juno
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(JUNO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(JUNO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.juno.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Juno.app/Juno"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: JunoTests
        CFBundleShortVersionString: "$(JUNO_MARKETING_VERSION)"
        CFBundleVersion: "$(JUNO_BUILD_VERSION)"

  JunoLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: JunoKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(JUNO_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(JUNO_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.juno.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: JunoLogicTests
        CFBundleShortVersionString: "$(JUNO_MARKETING_VERSION)"
        CFBundleVersion: "$(JUNO_BUILD_VERSION)"
